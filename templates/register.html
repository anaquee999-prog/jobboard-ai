<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก</title>
  
  <!-- เชื่อมโยงกับไฟล์ CSS -->
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <form method="post" class="auth-form">
    <!-- เบอร์โทรศัพท์ -->
    <div class="auth-field">
      <label for="phone_number">เบอร์โทรศัพท์</label>
      <input id="phone_number" name="phone_number" type="tel" inputmode="numeric" autocomplete="tel" placeholder="0800000000" required pattern="\d{10}">
      <div class="auth-help">กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง</div>
    </div>

    <!-- อีเมล -->
    <div class="auth-field">
      <label for="email">อีเมล</label>
      <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
      <div class="auth-help">จำเป็นต้องกรอก เพื่อรับการแจ้งเตือนในเว็บและทางอีเมล</div>
    </div>

    <!-- รหัสผ่าน -->
    <div class="auth-field">
      <label for="password">รหัสผ่าน</label>
      <input type="password" name="password" required placeholder="******" autocomplete="new-password">
      <div class="auth-help">อย่างน้อย 8 ตัว มีตัวอักษรและตัวเลข</div>
    </div>

    <!-- ยืนยันรหัสผ่าน -->
    <div class="auth-field">
      <label for="password_confirm">ยืนยันรหัสผ่าน</label>
      <input type="password" name="password_confirm" required placeholder="******" autocomplete="new-password">
      <div class="auth-help">กรุณากรอกรหัสผ่านให้ตรงกัน</div>
    </div>

    <!-- การยินยอมรับเงื่อนไข -->
    <div class="check-row">
      <label for="terms">
        <input type="checkbox" name="terms" id="terms" value="1" required checked>
        <span>ยินยอมรับนโยบายความปลอดภัย ห้ามโพสต์หลอกลวง การพนัน หรือการเผยแพร่ข้อมูลส่วนตัว</span>
      </label>
    </div>

    <!-- การยินยอมรับการแจ้งเตือน -->
    <div class="check-row">
      <label for="notify_consent">
        <input type="checkbox" name="notify_consent" id="notify_consent" value="1" required checked>
        <span>ยินยอมรับการแจ้งเตือนในเว็บและทางอีเมล</span>
      </label>
    </div>

    <!-- ปุ่มสมัครสมาชิก -->
    <div class="submit-btn-wrapper">
      <button type="submit" class="submit-btn">สมัครใช้งาน</button>
    </div>
  </form>
</body>
</html>
